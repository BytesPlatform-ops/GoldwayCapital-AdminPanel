[build]
  command = "prisma generate && next build"
  publish = ".next"

[build.environment]
  # This is a server-rendered admin app: every real secret is used only in
  # server-side API routes / Netlify Functions (never inlined into browser
  # code, since none are NEXT_PUBLIC_). The deploy secrets scanner only
  # produces false positives here (emails, localhost URLs, config flags),
  # failing the build on a different harmless key each run. Disable it.
  SECRETS_SCAN_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
